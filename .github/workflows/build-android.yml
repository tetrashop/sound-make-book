name: Build Android APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Create local.properties
        run: |
          cd android-app
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        run: chmod +x android-app/gradlew

      - name: Build APK
        run: |
          cd android-app
          ./gradlew assembleRelease

      - name: Find APK file
        id: find_apk
        run: |
          APK_PATH=$(find android-app -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK file found!"
            exit 1
          fi
          echo "✅ Found APK at: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sound-make-book-android
          path: ${{ steps.find_apk.outputs.apk_path }}

      - name: Create Release using GitHub CLI
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK_PATH="${{ steps.find_apk.outputs.apk_path }}"
          echo "📦 Creating release for tag: ${{ github.ref_name }} with APK: $APK_PATH"
          gh release create ${{ github.ref_name }} \
            --title "📱 sound-make-book ${{ github.ref_name }}" \
            --notes-file android_release_notes.md \
            "$APK_PATH" || echo "⚠️ Release creation failed but continuing"

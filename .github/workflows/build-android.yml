name: Build Android APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Create local.properties
        run: |
          cd android-app
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Make gradlew executable
        run: chmod +x android-app/gradlew

      - name: Build APK
        run: |
          cd android-app
          ./gradlew assembleRelease

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sound-make-book-android
          path: android-app/app/build/outputs/apk/release/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: sound-make-book ${{ github.ref_name }}
          body: |
            📱 sound-make-book برای اندروید

            🎧 تبدیل متن به کتاب صوتی با ۹ قابلیت پیشرفته

            ✨ ویژگی‌ها
            - تشخیص خودکار زبان (فارسی/انگلیسی)
            - تبدیل متن به صدای طبیعی
            - موسیقی پس‌زمینه
            - OCR استخراج متن از تصویر
            - تنظیمات پیشرفته صدا
            - ذخیره و مدیریت پروژه‌ها
            - کاملاً آفلاین و رایگان

            📱 سازگاری
            - اندروید ۸ به بالا

            👨‍💻 توسعه‌دهنده: رامین اجلال - @tetrashop
          files: |
            android-app/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
